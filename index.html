<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retirement Planner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; background: #f0f2f5; color: #222; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    #app { display: flex; flex: 1; overflow: hidden; }
    #left  { width: 340px; min-width: 280px; background: #fff; border-right: 1px solid #ddd; overflow-y: auto; padding: 16px; flex-shrink: 0; }
    #right { flex: 1; overflow: auto; padding: 16px; }

    h1 { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: #1a3a5c; letter-spacing: .3px; }

    .section { margin-bottom: 14px; }
    .section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: #888; margin-bottom: 6px; padding-bottom: 3px; border-bottom: 1px solid #eee; }
    .row  { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 4px; }
    .row1 { display: grid; grid-template-columns: 1fr;     gap: 6px; margin-bottom: 4px; }
    .field { display: flex; flex-direction: column; gap: 2px; }
    label { font-size: 10px; color: #666; }
    input[type=number], input[type=text] {
      padding: 5px 7px; border: 1px solid #ccc; border-radius: 3px; font-size: 12px; width: 100%; background: #fafafa;
    }
    input:focus { outline: none; border-color: #1a6eb5; background: #fff; box-shadow: 0 0 0 2px rgba(26,110,181,.12); }

    .event-row { display: grid; grid-template-columns: 58px 1fr 90px 24px; gap: 4px; margin-bottom: 4px; align-items: center; }
    .btn-sm { background: none; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; font-size: 11px; padding: 3px 7px; color: #555; }
    .btn-sm:hover { background: #f0f0f0; }
    .btn-del { color: #b00; border-color: #f5c6c6; padding: 3px 6px; }
    .btn-del:hover { background: #fff0f0; }

    #btn-run { width: 100%; padding: 9px; background: #1a6eb5; color: #fff; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    #btn-run:hover { background: #155d9a; }

    /* KPIs */
    #summary { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .kpi { background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 10px 14px; min-width: 150px; }
    .kpi-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: .4px; }
    .kpi-value { font-size: 20px; font-weight: 700; margin-top: 3px; color: #1a3a5c; }
    .kpi-value.warn { color: #b52020; }

    /* Table */
    table { border-collapse: collapse; width: 100%; background: #fff; font-size: 12px; border-radius: 4px; overflow: hidden; border: 1px solid #ddd; }
    th { background: #1a3a5c; color: #fff; padding: 8px 10px; text-align: right; font-weight: 600; white-space: nowrap; position: sticky; top: 0; }
    th:first-child { text-align: left; }
    td { padding: 6px 10px; text-align: right; border-bottom: 1px solid #f0f0f0; }
    td:first-child { text-align: left; }
    tr:hover td { background: #f5f8fc; }
    tr.below td { background: #fffbea; }
    tr.insolvent td { background: #fff0f0; }
    tr.qrow td { background: #fafafa; color: #666; font-size: 11px; border-bottom: 1px solid #f5f5f5; }
    tr.qrow td:first-child { padding-left: 26px; font-style: italic; }
    .neg { color: #b52020; font-weight: 600; }
    .expand { cursor: pointer; margin-right: 5px; font-size: 9px; color: #1a6eb5; user-select: none; }
    .placeholder { color: #aaa; text-align: center; padding: 60px 0; font-size: 14px; }

    /* Warnings */
    #warnings { margin-bottom: 10px; }
    .warn-box { background: #fff8e1; border-left: 3px solid #f0a500; padding: 5px 10px; margin-bottom: 4px; font-size: 12px; border-radius: 0 3px 3px 0; }
    .err-box  { background: #fff0f0; border-left: 3px solid #c00;    padding: 5px 10px; margin-bottom: 4px; font-size: 12px; border-radius: 0 3px 3px 0; }
  </style>
</head>
<body>
<div id="app">

  <!-- ═══ LEFT PANEL ═══ -->
  <div id="left">
    <h1>💷 Retirement Planner</h1>

    <div class="section">
      <div class="section-title">Exchange Rate</div>
      <div class="row1"><div class="field">
        <label>EUR → GBP rate</label>
        <input type="number" id="eurGbp" step="0.001" value="0.850" />
      </div></div>
    </div>

    <div class="section">
      <div class="section-title">Income</div>
      <div class="row">
        <div class="field"><label>Net salary (EUR / yr)</label><input type="number" id="salary" step="1000" value="60000" /></div>
        <div class="field"><label>Months still working</label><input type="number" id="monthsWork" step="1" value="120" /></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Savings</div>
      <div class="row">
        <div class="field"><label>Current savings (GBP)</label><input type="number" id="savings" step="1000" value="100000" /></div>
        <div class="field"><label>Return rate % (real)</label><input type="number" id="savingsRate" step="0.1" value="3.0" /></div>
      </div>
      <div class="row1"><div class="field">
        <label>Minimum threshold (GBP)</label>
        <input type="number" id="savingsThreshold" step="1000" value="20000" />
      </div></div>
    </div>

    <div class="section">
      <div class="section-title">Private Pension</div>
      <div class="row">
        <div class="field"><label>Current pot (GBP)</label><input type="number" id="pension" step="1000" value="200000" /></div>
        <div class="field"><label>Return rate % (real)</label><input type="number" id="pensionRate" step="0.1" value="4.0" /></div>
      </div>
      <div class="row1"><div class="field">
        <label>Annual drawdown %</label>
        <input type="number" id="drawdown" step="0.1" value="5.0" />
      </div></div>
    </div>

    <div class="section">
      <div class="section-title">State Pension — You</div>
      <div class="row">
        <div class="field"><label>Amount (GBP / yr)</label><input type="number" id="spUser" step="100" value="11500" /></div>
        <div class="field"><label>Start year</label><input type="number" id="spUserYear" step="1" value="2041" /></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">State Pension — Spouse</div>
      <div class="row">
        <div class="field"><label>Amount (GBP / yr)</label><input type="number" id="spSpouse" step="100" value="11500" /></div>
        <div class="field"><label>Start year</label><input type="number" id="spSpouseYear" step="1" value="2043" /></div>
      </div>
      <div class="row1"><div class="field">
        <label>Annual increase %</label>
        <input type="number" id="spIncrease" step="0.1" value="2.0" />
      </div></div>
    </div>

    <div class="section">
      <div class="section-title">Mortgage</div>
      <div class="row">
        <div class="field"><label>Remaining (GBP)</label><input type="number" id="mortgageRem" step="1000" value="150000" /></div>
        <div class="field"><label>Annual payments (GBP)</label><input type="number" id="mortgagePay" step="500" value="15000" /></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">House Sale</div>
      <div class="row">
        <div class="field"><label>Sale year</label><input type="number" id="houseSaleYear" step="1" value="2045" /></div>
        <div class="field"><label>Proceeds (GBP)</label><input type="number" id="houseSalePrice" step="5000" value="400000" /></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Target Annual Expenditure</div>
      <div class="row1"><div class="field">
        <label>Target spend (GBP / yr, excl. mortgage)</label>
        <input type="number" id="targetSpend" step="1000" value="40000" />
      </div></div>
    </div>

    <div class="section">
      <div class="section-title">One-off Events &nbsp;<small style="font-weight:400;text-transform:none;font-size:10px">(+ve = receipt, −ve = expense)</small></div>
      <div id="events-list"></div>
      <button class="btn-sm" id="btn-add-event">＋ Add event</button>
    </div>

    <button id="btn-run">Run Simulation →</button>
  </div>

  <!-- ═══ RIGHT PANEL ═══ -->
  <div id="right">
    <div id="summary"></div>
    <div id="warnings"></div>
    <div id="results"><p class="placeholder">Set your parameters and click <strong>Run Simulation</strong>.</p></div>
  </div>

</div>
<script>
'use strict';

// ─── State ───────────────────────────────────
/** @type {{ year:number, amount:number, description:string, currency:'GBP'|'EUR' }[]} */
let events = [];
/** @type {Set<number>} */
const expandedYears = new Set();
/** @type {import('./types').YearResult[] | null} */
let lastResults = null;
/** @type {import('./types').Params | null} */
let lastParams  = null;

// ─── One-off events UI ───────────────────────
function renderEvents() {
  const list = document.getElementById('events-list');
  list.innerHTML = '';
  events.forEach((ev, i) => {
    const row = document.createElement('div');
    row.className = 'event-row';
    row.innerHTML =
      `<input type="number" value="${ev.year}" placeholder="Year" data-i="${i}" data-f="year" />` +
      `<input type="text"   value="${escHtml(ev.description)}" placeholder="Description" data-i="${i}" data-f="description" />` +
      `<input type="number" value="${ev.amount}" placeholder="±GBP amount" data-i="${i}" data-f="amount" />` +
      `<button class="btn-sm btn-del" data-i="${i}">✕</button>`;
    list.appendChild(row);
  });

  list.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('change', e => {
      const el = /** @type {HTMLInputElement} */ (e.target);
      const i  = +el.dataset.i;
      const f  = el.dataset.f;
      events[i][f] = f === 'year' || f === 'amount' ? parseFloat(el.value) || 0 : el.value;
    });
  });

  list.querySelectorAll('button.btn-del').forEach(btn => {
    btn.addEventListener('click', e => {
      const i = +(/** @type {HTMLElement} */ (e.target)).dataset.i;
      events.splice(i, 1);
      renderEvents();
    });
  });
}

document.getElementById('btn-add-event').addEventListener('click', () => {
  events.push({ year: new Date().getFullYear(), amount: 0, description: '', currency: 'GBP' });
  renderEvents();
});

// ─── Read inputs ─────────────────────────────
function n(id) { return parseFloat(document.getElementById(id).value) || 0; }

function readParams() {
  return {
    eurGbp:           n('eurGbp'),
    salary:           n('salary'),
    monthsWork:       n('monthsWork'),
    savings:          n('savings'),
    savingsRate:      n('savingsRate') / 100,
    savingsThreshold: n('savingsThreshold'),
    pension:          n('pension'),
    pensionRate:      n('pensionRate') / 100,
    drawdown:         n('drawdown') / 100,
    spUser:           n('spUser'),
    spUserYear:       n('spUserYear'),
    spSpouse:         n('spSpouse'),
    spSpouseYear:     n('spSpouseYear'),
    spIncrease:       n('spIncrease') / 100,
    mortgageRem:      n('mortgageRem'),
    mortgagePay:      n('mortgagePay'),
    houseSaleYear:    n('houseSaleYear'),
    houseSalePrice:   n('houseSalePrice'),
    targetSpend:      n('targetSpend'),
    events:           events.slice(),
  };
}

// ─── Simulation ───────────────────────────────
function simulate(p) {
  const START     = new Date().getFullYear();
  const END       = 2050;
  const retireYr  = START + p.monthsWork / 12;   // fractional year

  let savingsBal   = p.savings;
  let pensionBal   = p.pension;
  let mortgageLeft = p.mortgageRem;

  /** @type {object[]} */
  const results = [];

  for (let yr = START; yr <= END; yr++) {
    const pensionStart = pensionBal;

    // Pension: grow then draw
    pensionBal += pensionBal * p.pensionRate;
    const pensionDrawn = pensionBal * p.drawdown;
    pensionBal -= pensionDrawn;

    // Salary (converted to GBP, pro-rated in retirement year)
    let salaryIncome = 0;
    if (yr < retireYr) {
      const monthsThisYear = (yr + 1 <= retireYr) ? 12 : (retireYr - yr) * 12;
      salaryIncome = p.salary * p.eurGbp * Math.min(monthsThisYear, 12) / 12;
    }

    // State pensions
    const userSP   = yr >= p.spUserYear
      ? p.spUser   * Math.pow(1 + p.spIncrease, yr - p.spUserYear)   : 0;
    const spouseSP = yr >= p.spSpouseYear
      ? p.spSpouse * Math.pow(1 + p.spIncrease, yr - p.spSpouseYear) : 0;
    const statePensionIncome = userSP + spouseSP;

    // Savings interest on opening balance
    const savingsInterest = savingsBal * p.savingsRate;

    // One-off events for this year (all treated as GBP)
    const oneOff = p.events
      .filter(e => e.year === yr)
      .reduce((s, e) => s + (e.currency === 'EUR' ? e.amount * p.eurGbp : e.amount), 0);

    // House sale
    const houseSale = (yr === p.houseSaleYear) ? p.houseSalePrice : 0;

    // Mortgage payment
    const mortgage = Math.min(mortgageLeft, p.mortgagePay);
    mortgageLeft   = Math.max(0, mortgageLeft - mortgage);

    const totalIncome    = salaryIncome + pensionDrawn + statePensionIncome + savingsInterest + oneOff + houseSale;
    const totalOutgoings = p.targetSpend + mortgage;

    // Update savings: add interest + all inflows, subtract outflows
    savingsBal = savingsBal + savingsInterest + salaryIncome + pensionDrawn
                 + statePensionIncome + oneOff + houseSale - totalOutgoings;

    results.push({
      year: yr,
      salaryIncome,
      pensionDrawn,
      statePensionIncome,
      savingsInterest,
      oneOff,
      houseSale,
      totalIncome,
      mortgage,
      targetSpend: p.targetSpend,
      totalOutgoings,
      pensionStart,
      pensionEnd:  pensionBal,
      savingsEnd:  savingsBal,
    });
  }
  return results;
}

// ─── Format helpers ───────────────────────────
function gbp(v) {
  const abs = Math.abs(Math.round(v));
  return (v < 0 ? '−' : '') + '£' + abs.toLocaleString('en-GB');
}
function cell(v) {
  return v < 0
    ? `<span class="neg">${gbp(v)}</span>`
    : gbp(v);
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Render ───────────────────────────────────
function renderResults(results, p) {
  lastResults = results;
  lastParams  = p;

  // ── KPIs ──
  const last       = results[results.length - 1];
  const minSavings = Math.min(...results.map(r => r.savingsEnd));
  const minYear    = results.find(r => r.savingsEnd === minSavings);
  const lastSolvent= [...results].reverse().find(r => r.savingsEnd >= 0);

  document.getElementById('summary').innerHTML =
    `<div class="kpi">
       <div class="kpi-label">Savings at 2050</div>
       <div class="kpi-value ${last.savingsEnd < 0 ? 'warn' : ''}">${gbp(last.savingsEnd)}</div>
     </div>
     <div class="kpi">
       <div class="kpi-label">Lowest savings</div>
       <div class="kpi-value ${minSavings < p.savingsThreshold ? 'warn' : ''}">${gbp(minSavings)}<br>
         <small style="font-size:11px;font-weight:400;color:#888">(${minYear ? minYear.year : '—'})</small></div>
     </div>
     <div class="kpi">
       <div class="kpi-label">Last solvent year</div>
       <div class="kpi-value ${lastSolvent && lastSolvent.year < 2050 ? 'warn' : ''}">${lastSolvent ? lastSolvent.year : 'Never'}</div>
     </div>
     <div class="kpi">
       <div class="kpi-label">Pension pot at 2050</div>
       <div class="kpi-value">${gbp(last.pensionEnd)}</div>
     </div>`;

  // ── Warnings ──
  const wDiv = document.getElementById('warnings');
  wDiv.innerHTML = '';
  results.forEach(r => {
    if (r.savingsEnd < 0)
      wDiv.innerHTML += `<div class="err-box">🔴 ${r.year}: savings go negative (${gbp(r.savingsEnd)})</div>`;
    else if (r.savingsEnd < p.savingsThreshold)
      wDiv.innerHTML += `<div class="warn-box">⚠️ ${r.year}: savings below threshold (${gbp(r.savingsEnd)})</div>`;
  });

  // ── Table ──
  let html = `<table>
  <thead><tr>
    <th>Year</th>
    <th>Salary</th>
    <th>Pension Income</th>
    <th>State Pension</th>
    <th>Savings Interest</th>
    <th>One-offs / Sale</th>
    <th>Total Income</th>
    <th>Mortgage</th>
    <th>Living Spend</th>
    <th>Total Outgoings</th>
    <th>Pension Pot (yr start)</th>
    <th>Savings (yr end)</th>
  </tr></thead><tbody>`;

  results.forEach(r => {
    const exp      = expandedYears.has(r.year);
    const rowClass = r.savingsEnd < 0 ? 'insolvent' : r.savingsEnd < p.savingsThreshold ? 'below' : '';
    const icon     = `<span class="expand" data-yr="${r.year}">${exp ? '▼' : '▶'}</span>`;
    const oneOff   = r.oneOff + r.houseSale;

    html += `<tr class="${rowClass}">
      <td>${icon}${r.year}</td>
      <td>${r.salaryIncome > 0 ? cell(r.salaryIncome) : '—'}</td>
      <td>${cell(r.pensionDrawn)}</td>
      <td>${r.statePensionIncome > 0 ? cell(r.statePensionIncome) : '—'}</td>
      <td>${cell(r.savingsInterest)}</td>
      <td>${oneOff !== 0 ? cell(oneOff) : '—'}</td>
      <td><strong>${cell(r.totalIncome)}</strong></td>
      <td>${r.mortgage > 0 ? cell(r.mortgage) : '—'}</td>
      <td>${cell(r.targetSpend)}</td>
      <td><strong>${cell(r.totalOutgoings)}</strong></td>
      <td>${cell(r.pensionStart)}</td>
      <td><strong>${cell(r.savingsEnd)}</strong></td>
    </tr>`;

    if (exp) {
      ['Q1','Q2','Q3','Q4'].forEach(q => {
        html += `<tr class="qrow">
          <td>${q}</td>
          <td>${r.salaryIncome > 0 ? gbp(r.salaryIncome/4) : '—'}</td>
          <td>${gbp(r.pensionDrawn/4)}</td>
          <td>${r.statePensionIncome > 0 ? gbp(r.statePensionIncome/4) : '—'}</td>
          <td>${gbp(r.savingsInterest/4)}</td>
          <td>—</td>
          <td>${gbp(r.totalIncome/4)}</td>
          <td>${r.mortgage > 0 ? gbp(r.mortgage/4) : '—'}</td>
          <td>${gbp(r.targetSpend/4)}</td>
          <td>${gbp(r.totalOutgoings/4)}</td>
          <td>—</td>
          <td>—</td>
        </tr>`;
      });
    }
  });

  html += '</tbody></table>';
  document.getElementById('results').innerHTML = html;

  // attach expand listeners
  document.querySelectorAll('.expand').forEach(el => {
    el.addEventListener('click', e => {
      const yr = +(/** @type {HTMLElement} */(e.target)).dataset.yr;
      expandedYears.has(yr) ? expandedYears.delete(yr) : expandedYears.add(yr);
      renderResults(lastResults, lastParams);
    });
  });
}

// ─── Run button ───────────────────────────────
document.getElementById('btn-run').addEventListener('click', () => {
  const p = readParams();
  renderResults(simulate(p), p);
});
</script>
</body>
</html>
